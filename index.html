<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор себестоимости блюда | Junior Fullstack Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator-card">
            <div class="badge">🚀 Junior Fullstack Project</div>
            <h1>Калькулятор себестоимости блюда</h1>
            <p class="subtitle">Рассчитайте цену для гостя за 5 секунд</p>
            
            <div class="input-group">
                <label>💰 Себестоимость продуктов (₽)</label>
                <input type="number" id="ingredients" placeholder="Например: 200" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>📈 Наценка (%)</label>
                <input type="number" id="markup" placeholder="Например: 50" autocomplete="off">
            </div>
            
            <button onclick="calculate()">Рассчитать цену →</button>
            
            <div class="result-card">
                <p class="result-label">Цена для гостя:</p>
                <p class="result-price"><span id="finalPrice">0</span> ₽</p>
            </div>
            
            <p class="example-hint">💡 Пример: продукты 200₽ + наценка 50% = 300₽</p>
        </div>
        
        <div class="footer">
            <p>📍 Проект для портфолио | Ищу Junior Fullstack Developer</p>
            <p>🛠️ HTML + CSS + JavaScript | GitHub: azizovshaikh-debug</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
